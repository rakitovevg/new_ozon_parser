<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ozon Parser{% endblock %}</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/favicon.svg">
    {% if public_base_url %}
    <link rel="canonical" href="{{ public_base_url }}{{ request.url.path }}{% if request.url.query %}?{{ request.url.query }}{% endif %}">
    {% endif %}
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'DM Sans', system-ui, sans-serif; } </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div class="flex min-h-screen">
        <aside class="w-56 bg-slate-900 text-white flex flex-col fixed h-full">
            <div class="p-5 border-b border-slate-700">
                <a href="/" class="text-lg font-bold flex items-center gap-2">
                    <img src="/static/favicon.svg" alt="" width="32" height="32" class="w-8 h-8 rounded-lg shrink-0" loading="lazy">
                    Ozon Parser
                </a>
            </div>
            <nav class="flex-1 p-3 space-y-0.5">
                <a href="/?tab=tasks" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white">Задачи</a>
                <a href="/?tab=found" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white">Найденные товары</a>
                <a href="/?tab=proxies" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white">Прокси</a>
            </nav>
        </aside>
        <main class="flex-1 ml-56 p-8">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
